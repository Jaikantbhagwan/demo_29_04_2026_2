name: Trigger auto deployment for demo-app

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/demo-app-AutoDeployTrigger-157ad407-5909-4876-8234-62e02e6f5e4d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DEMOAPP_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DEMOAPP_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DEMOAPP_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: demoregistryjai123.azurecr.io
          registryUsername: ${{ secrets.DEMOAPP_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DEMOAPP_REGISTRY_PASSWORD }}
          containerAppName: demo-app
          resourceGroup: demo-rg
          imageToBuild: demoregistryjai123.azurecr.io/demo-app:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


